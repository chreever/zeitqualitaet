backend:
  name: git-gateway
  branch: main

media_folder: "img"
public_folder: "/img"

collections:
  - name: "posts"
    label: "Beiträge"
    folder: "posts"
    create: true
    fields:
      - {label: "Titel", name: "title", widget: "string"}
      - label: "Kategorie"
        name: "category"
        widget: "select"
        default: "Zeitqualität"
        options: ["Mentale Stärke", "Zeitqualität", "Reflexion", "Persönlich", "Sternzeichen", "Allgemein"]
      - {label: "Datum", name: "date", widget: "datetime"}
      
      # MEDIEN FÜR KACHELN (Startseite/Archiv)
      - {label: "Vorschaubild für Kachel (Foto)", name: "image", widget: "image", required: false}
      - {label: "Vorschauvideo für Kachel (MP4)", name: "featured_video", widget: "file", required: false}
      
      # MEDIEN FÜR DAS BANNER (Ganz oben auf der Startseite)
      - {label: "Hintergrund-Video NUR für Banner (MP4)", name: "video", widget: "file", required: false}
      
      # DAS EIGENTLICHE FOTO IM BEITRAG
      - {label: "Hauptfoto im Beitrag (Erscheint im Artikel)", name: "post_image", widget: "image", required: false}
      
      - {label: "Kurzbeschreibung", name: "description", widget: "text", required: false}
      
      - label: "Banner-Platzierung"
        name: "placement"
        widget: "select"
        options:
          - { label: "Kein Banner", value: "Kein Banner" }
          - { label: "Top-Banner (Header)", value: "Top-Banner (Header)" }
          - { label: "Info-Banner (Mitte)", value: "Info-Banner (Mitte)" }
        default: "Kein Banner"
        required: false
        
      - {label: "Inhalt", name: "body", widget: "markdown"}

  - name: "settings"
    label: "Einstellungen"
    files:
      - label: "Tages-Impulse"
        name: "impulses"
        file: "data/impulses.json"
        fields:
          - label: "Alle Impulse für den Monat"
            name: "impulses_block"
            widget: "markdown"
            hint: "Format pro Zeile: YYYY-MM-DD: Dein Text"
