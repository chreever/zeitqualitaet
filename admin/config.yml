backend:
  name: git-gateway
  branch: main

media_folder: "img"
public_folder: "/img"

collections:
  - name: "blog"
    label: "Blogbeiträge"
    folder: "posts"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Titel", name: "title", widget: "string"}
      # --- DAS HIER IST DAS NEUE DROPDOWN-FELD ---
      - label: "Kategorie"
        name: "category"
        widget: "select"
        options: ["Transite", "Grundlagen", "Impulse", "Sternzeichen", "Allgemein"]
        default: "Allgemein"
      # ------------------------------------------
      - {label: "Inhalt", name: "body", widget: "markdown"}
