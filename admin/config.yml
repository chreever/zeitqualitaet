backend:
  name: git-gateway
  branch: main

media_folder: "img"
public_folder: "img"

collections:
  - name: "blog"
    label: "Blogbeiträge"
    folder: "posts"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Titel", name: "title", widget: "string"}
      - {label: "Kategorie", name: "category", widget: "select", options: ["Transite", "Mondphasen", "Grundlagen", "Impulse", "Sternzeichen", "Allgemein"], default: "Allgemein"}
      - {label: "Als Top-Thema im Banner anzeigen?", name: "highlight", widget: "boolean", default: false}
      
      # --- FLEXIBLE MEDIEN & TEXT ---
      - {label: "Beitragsbild (Statisch)", name: "image", widget: "image", choose_url: true, required: false}
      - {label: "ODER Video-Hintergrund (MP4)", name: "video", widget: "file", choose_url: true, required: false}
      - {label: "Kurzbeschreibung (Großes Textfeld)", name: "description", widget: "text", required: false}
      - {label: "Badge Text", name: "badge", widget: "string", required: false}
      # ------------------------------

      - {label: "Inhalt", name: "body", widget: "markdown"}
