backend:
  name: git-gateway
  branch: main

media_folder: "img"
public_folder: "/img"

collections:
  - name: "posts"
    label: "Beiträge"
    folder: "posts"
    create: true
    fields:
      - {label: "Titel", name: "title", widget: "string"}
      - label: "Kategorie"
        name: "category"
        widget: "select"
        default: "Zeitqualität"
        # HIER GEÄNDERT: "Sternzeichen" zu "Archetypen"
        options: ["Mentale Stärke", "Zeitqualität", "Reflexion", "Persönlich", "Archetypen", "Astro-Experiment", "Allgemein"]
      - {label: "Datum", name: "date", widget: "datetime"}
      
      # 1. MEDIEN FÜR DIE STARTSEITEN-KACHELN & SOCIAL MEDIA VORSCHAU
      - {label: "Kachel-Bild & Social Media (WICHTIG!)", name: "image", widget: "image", required: true, hint: "Das ist das Pflicht-Bild. Es erscheint in den Kacheln auf der Startseite und bei Links auf WhatsApp/Facebook."}
      - {label: "Optional: Bewegtes Kachel-Video (MP4)", name: "featured_video", widget: "file", required: false, hint: "Wenn du ein GIF/MP4 hochlädst, spielt dieses in der Kachel statt des Bildes ab."}
      
      # 2. MEDIEN FÜR DEN GROSSEN BANNER (Top-Header oder Mitte)
      - {label: "Banner-Bild (Hintergrund)", name: "banner_image", widget: "image", required: false, hint: "Erscheint groß im Hintergrund, wenn dieser Beitrag als Banner geschaltet ist."}
      - {label: "Banner-Video (MP4)", name: "video", widget: "file", required: false, hint: "Wenn du hier ein MP4 hochlädst, überschreibt das Video das Banner-Bild."}
      
      # 3. MEDIEN FÜR DEN ARTIKEL SELBST (Wenn man draufklickt)
      - {label: "Hauptfoto im Blog-Artikel", name: "post_image", widget: "image", required: false, hint: "Erscheint ganz oben, wenn jemand deinen Text liest."}
      
      - {label: "Kurzbeschreibung", name: "description", widget: "text", required: false}
      
      - label: "Banner-Platzierung"
        name: "placement"
        widget: "select"
        options:
          - { label: "Kein Banner", value: "Kein Banner" }
          - { label: "Top-Banner (Header)", value: "Top-Banner (Header)" }
          - { label: "Info-Banner (Mitte)", value: "Info-Banner (Mitte)" }
        default: "Kein Banner"
        required: false
        
      - {label: "Inhalt", name: "body", widget: "markdown"}

  - name: "settings"
    label: "Einstellungen"
    files:
      - label: "Tages-Impulse"
        name: "impulses"
        file: "data/impulses.json"
        fields:
          - label: "Alle Impulse für den Monat"
            name: "impulses_block"
            widget: "markdown"
            hint: "Format pro Zeile: YYYY-MM-DD: Dein Text"
