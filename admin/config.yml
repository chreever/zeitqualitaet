backend:
  name: git-gateway
  branch: main

media_folder: "img"
public_folder: "/img"

collections:
  - name: "posts"
    label: "Beiträge"
    folder: "posts"
    create: true
    fields:
      - {label: "Titel", name: "title", widget: "string"}
      - label: "Kategorie"
        name: "category"
        widget: "select"
        options: ["Mentaltraining", "Transite", "Grundlagen", "Impulse", "Sternzeichen", "Allgemein"]
      - {label: "Datum", name: "date", widget: "datetime"}
      
      # Medien für die Vorschau-Kacheln
      - {label: "Vorschaubild für Kachel (Foto)", name: "image", widget: "image", required: false}
      - {label: "Vorschauvideo für Kachel (MP4)", name: "featured_video", widget: "file", required: false}
      
      # Medien für die großen Banner
      - {label: "Hintergrund-Video nur für Banner (MP4)", name: "video", widget: "file", required: false}
      
      - {label: "Kurzbeschreibung", name: "description", widget: "text", required: false}
      
      # Krisensicheres Select-Feld (mit explizitem Label und Value)
      - label: "Banner-Platzierung"
        name: "placement"
        widget: "select"
        options:
          - { label: "Kein Banner", value: "Kein Banner" }
          - { label: "Top-Banner (Header)", value: "Top-Banner (Header)" }
          - { label: "Info-Banner (Mitte)", value: "Info-Banner (Mitte)" }
        default: "Kein Banner"
        required: false
        
      - {label: "Inhalt", name: "body", widget: "markdown"}

  # NEU: Einstellungs-Dateien (Für Listen und globale Texte)
  - name: "settings"
    label: "Einstellungen"
    files:
      - label: "Tages-Impulse"
        name: "impulses"
        file: "data/impulses.json"
        fields:
          - label: "Liste der Impulse (Tag 1 bis 31)"
            name: "daily_impulses"
            widget: "list"
            field: {label: "Impuls Text", name: "text", widget: "text"}
