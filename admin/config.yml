backend:
  name: git-gateway
  branch: main

media_folder: "img"
public_folder: "/img"

collections:
  - name: "blog"
    label: "Blogbeiträge"
    folder: "posts"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Titel", name: "title", widget: "string"}
      - {label: "Datum", name: "date", widget: "datetime"}
      - {label: "Vorschaubild", name: "image", widget: "image"}
      - {label: "Kurzbeschreibung", name: "description", widget: "text"}
      - {label: "Inhalt", name: "body", widget: "markdown"}
