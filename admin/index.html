<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zeitqualität Admin</title>
  
  <link rel="icon" type="image/png" href="../img/zq-favicon.png">
  <link rel="apple-touch-icon" href="../img/zq-favicon.png">

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  
  <style>
    /* Styling für den schwebenden Button */
    .exit-button {
      position: fixed;
      top: 10px;
      right: 20px;
      z-index: 9999;
      font-family: sans-serif;
      font-size: 13px;
      color: #fff;
      background: #08090e; /* Deine Website-Farbe */
      border: 1px solid #d4a56a; /* Gold/Accent */
      padding: 8px 16px;
      border-radius: 50px;
      text-decoration: none;
      transition: 0.3s;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .exit-button:hover {
      background: #d4a56a;
      color: #08090e;
    }
  </style>
</head>
<body>

  <a href="/" class="exit-button">
    <span>←</span> Zurück zur Website
  </a>

  <script src="https://cdn.jsdelivr.net/npm/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
