<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archiv — Zeitqualität</title>
  
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <link rel="icon" type="image/svg+xml" href="img/zq-favicon.svg">
  <link rel="alternate icon" href="img/zq-favicon.png">
  <link rel="apple-touch-icon" href="img/zq-favicon.png">

  <style>
    /* ── LOKALE SCHRIFTEN ── */
    @font-face { font-family: 'Cormorant Garamond'; src: url('fonts/cormorant-garamond.woff2') format('woff2'); font-weight: 400; font-display: swap; }
    @font-face { font-family: 'Cormorant Garamond'; src: url('fonts/cormorant-garamond-500.woff2') format('woff2'); font-weight: 500; font-display: swap; }
    @font-face { font-family: 'Figtree'; src: url('fonts/figtree.woff2') format('woff2'); font-weight: 300; font-display: swap; }
    @font-face { font-family: 'Figtree'; src: url('fonts/figtree-400.woff2') format('woff2'); font-weight: 400; font-display: swap; }
    @font-face { font-family: 'IBM Plex Mono'; src: url('fonts/ibm-plex-mono.woff2') format('woff2'); font-weight: 400; font-display: swap; }

    :root {
      --bg: #08090e; --bg-warm: #0c0d14; --bg-card: #11121a; --bg-elevated: #1a1b26;
      --text: #e2dfd8; --text-muted: #918d84; --text-dim: #5c5950; 
      --accent: #d4a56a; --accent-light: #e8c48e; --accent-dim: rgba(212, 165, 106, 0.1);
      --border: #222330; --border-light: #1a1b26;
      --font-display: 'Cormorant Garamond', Georgia, serif; 
      --font-body: 'Figtree', system-ui, sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
      --radius: 10px; --max-w: 1100px; --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-body); background: var(--bg); color: var(--text); line-height: 1.75; font-weight: 300; -webkit-font-smoothing: antialiased; }
    a { color: var(--accent); text-decoration: none; transition: var(--transition); }
    
    .starfield { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
    .starfield canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

    /* ── NAV ── */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(8, 9, 14, 0.85); backdrop-filter: blur(28px); border-bottom: 1px solid var(--border-light); }
    .nav-inner { max-width: var(--max-w); margin: 0 auto; padding: 0 2rem; height: 80px; display: flex; align-items: center; justify-content: space-between; }
    
    .logo-container { display: flex; align-items: center; gap: 12px; text-decoration: none; height: 100%; }
    .logo-container svg, .logo-container span { transition: var(--transition); }
    .logo-container:hover svg { transform: scale(1.08) rotate(5deg); filter: brightness(1.2); }
    .logo-container:hover span { color: var(--accent); }

    .nav-links { display: flex; gap: 2.2rem; align-items: center; }
    .nav-links a { color: var(--text-muted); font-size: 0.8rem; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.1em; }
    .nav-links a:hover { color: var(--accent); }

    .header-spacer { height: 120px; }

    section { max-width: var(--max-w); margin: 0 auto; padding: 3rem 2rem 5rem; }
    .section-title { font-family: var(--font-display); font-size: clamp(2rem, 5vw, 2.5rem); font-weight: 400; margin-bottom: 0.5rem; color: var(--accent); text-transform: uppercase; }

    /* ── SUCHFELD ── */
    .search-container { position: relative; width: 100%; max-width: 500px; margin: 0 auto 4rem; }
    #post-search { width: 100%; padding: 16px 24px; background: rgba(26, 27, 38, 0.5); border: 1px solid var(--border); border-radius: 100px; color: var(--text); font-family: var(--font-body); font-size: 1.1rem; outline: none; transition: 0.3s; backdrop-filter: blur(10px); }
    #post-search:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-dim); background: var(--bg-card); }

    /* ── KACHELN ── */
    .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
    .post-card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius); overflow: hidden; transition: var(--transition); display: block; color: inherit; }
    .post-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    
    .post-card-media { width: 100%; height: 220px; position: relative; background: var(--bg-elevated); border-bottom: 1px solid var(--border-light); overflow: hidden; }
    .post-card-media img, .post-card-media video { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
    .post-card:hover .post-card-media img, .post-card:hover .post-card-media video { transform: scale(1.05); }
    
    .post-card-body { padding: 1.8rem; }
    .post-tag { font-family: var(--font-mono); font-size: 0.75rem; color: var(--accent); text-transform: uppercase; margin-bottom: 0.7rem; display: block; letter-spacing: 0.05em; }
    .post-card h3 { font-family: var(--font-display); font-size: 1.35rem; font-weight: 500; margin-bottom: 0.8rem; color: var(--text); line-height: 1.3; }
    .post-card-desc { font-size: 0.95rem; color: var(--text-muted); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    footer { border-top: 1px solid var(--border-light); padding: 3.5rem 2rem; text-align: center; margin-top: 4rem;}
    
    .fade-up { opacity: 0; transform: translateY(24px); transition: 0.8s ease; }
    .fade-up.visible { opacity: 1; transform: translateY(0); }

    @media (max-width: 768px) {
      .nav-inner { padding: 0 1.5rem; height: 70px; }
      section { padding: 2rem 1.5rem 3rem; }
      .posts-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="starfield"><canvas id="stars"></canvas></div>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo-container">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" style="height: 42px; width: 42px;">
        <defs>
          <linearGradient id="gold-logo" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f2d5a3"/>
            <stop offset="40%" stop-color="#d4a56a"/>
            <stop offset="100%" stop-color="#a67b45"/>
          </linearGradient>
        </defs>
        <circle cx="60" cy="60" r="54" fill="none" stroke="url(#gold-logo)" stroke-width="1.5" opacity="0.25"/>
        <circle cx="60" cy="60" r="44" fill="none" stroke="url(#gold-logo)" stroke-width="0.5" opacity="0.6"/>
        <path d="M60 8 Q60 60 8 60 Q60 60 60 112 Q60 60 112 60 Q60 60 60 8 Z" fill="url(#gold-logo)" opacity="0.15"/>
        <path d="M60 22 Q60 60 22 60 Q60 60 60 98 Q60 60 98 60 Q60 60 60 22 Z" fill="url(#gold-logo)"/>
        <circle cx="60" cy="60" r="2.5" fill="#ffffff" opacity="0.9"/>
      </svg>
      <span style="font-family: var(--font-display); font-size: 1.6rem; color: var(--text); font-weight: 400; letter-spacing: 0.04em; margin-left: 8px;">Zeitqualität</span>
    </a>
    <div class="nav-links">
      <a href="index.html">← Zur Startseite</a>
    </div>
  </div>
</nav>

<div class="header-spacer"></div>

<section id="archiv">
  <div style="display: flex; flex-direction: column; align-items: center; text-align: center;">
    <h2 class="section-title">Das kosmische Archiv</h2>
    <p style="color:var(--text-muted); margin-bottom: 2rem; font-size: 1.1rem;">Durchsuche alle bisherigen Impulse und Beiträge.</p>
    
    <div class="search-container">
      <input type="text" id="post-search" placeholder="Echtzeitsuche: Begriff eingeben (z.B. Ostern)...">
    </div>
  </div>
  
  <div id="dynamic-posts" class="posts-grid">
    <p style="color:var(--text-dim); text-align:center; grid-column: 1/-1;">Archiv wird geladen...</p>
  </div>
</section>

<footer>
  <a href="index.html" class="logo-container" style="display: inline-flex; margin-bottom: 0.8rem; justify-content: center; width: 100%;">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" style="height: 38px; width: 38px;">
      <defs><linearGradient id="gold-logo-f" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f2d5a3"/><stop offset="100%" stop-color="#a67b45"/></linearGradient></defs>
      <circle cx="60" cy="60" r="54" fill="none" stroke="url(#gold-logo-f)" stroke-width="1.5" opacity="0.25"/>
      <path d="M60 22 Q60 60 22 60 Q60 60 60 98 Q60 60 98 60 Q60 60 60 22 Z" fill="url(#gold-logo-f)"/>
    </svg>
    <span style="font-family: var(--font-display); font-size: 1.5rem; color: var(--text); margin-left: 8px;">Zeitqualität</span>
  </a>
  <p style="color: var(--text-dim); font-size: 0.85rem; margin-top: 0.5rem;">© 2026 Zeitqualität · Christian Balas</p>
</footer>

<script>
  // Sterne Hintergrund
  (function() {
    const canvas = document.getElementById('stars'); const ctx = canvas.getContext('2d');
    let stars = []; function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    function create() { stars = []; for(let i=0; i<150; i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*1.5, p:Math.random()*Math.PI*2}); }
    function draw(t) { ctx.clearRect(0,0,canvas.width,canvas.height); stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fillStyle = "#e2dfd8"; ctx.globalAlpha = Math.sin(t*0.001 + s.p)*0.4+0.6; ctx.fill(); }); requestAnimationFrame(draw); }
    resize(); create(); draw(0); window.addEventListener('resize', resize);
  })();

  function fixPath(path) {
    if (!path) return "";
    let clean = path.trim().replace(/['"]/g, ''); 
    if (clean.startsWith('http') || clean.startsWith('/')) return clean;
    return '/' + clean;
  }

  let allPosts = [];

  async function loadArchivePosts() {
    const container = document.getElementById('dynamic-posts');
    const searchInput = document.getElementById('post-search');
    
    try {
      // 1. Direktes Abrufen von GitHub (ohne den fehleranfälligen allorigins-Proxy)
      const apiURL = 'https://api.github.com/repos/chreever/zeitqualitaet/contents/posts?ref=main';
      const response = await fetch(apiURL);
      
      // Fehlerbehandlung, falls GitHub blockiert
      if (!response.ok) {
         if (response.status === 403 || response.status === 429) {
             throw new Error("GitHub-Sicherheitssperre (Zu viele Aufrufe beim Testen). Bitte warte ein paar Minuten.");
         }
         if (response.status === 404) {
             throw new Error("Ordner 'posts' nicht gefunden.");
         }
         throw new Error("Fehlercode: " + response.status);
      }

      const files = await response.json();
      if (!Array.isArray(files)) throw new Error("Keine gültige Dateiliste von GitHub erhalten.");

      let postsData = [];

      // 2. Texte LOKAL laden (Viel schneller!)
      for (let file of files) {
        if (file.name.endsWith('.md')) {
          try {
            const res = await fetch(`posts/${file.name}`);
            if (!res.ok) continue;
            const text = await res.text();
            
            let post = { 
              slug: file.name.replace('.md', ''),
              url: `post.html?id=${encodeURIComponent(file.name.replace('.md', ''))}`,
              title: '', category: 'Impuls', image: '', featured_video: '', description: '', date: ''
            };

            if (text.startsWith('---')) {
              const parts = text.split('---');
              if (parts.length >= 3) {
                parts[1].split('\n').forEach(line => {
                  const idx = line.indexOf(':');
                  if (idx !== -1) {
                    const key = line.substring(0, idx).trim().toLowerCase();
                    const val = line.substring(idx + 1).trim().replace(/['"]/g, '');
                    if (post.hasOwnProperty(key)) post[key] = val;
                  }
                });
              }
            }
            
            post.title = post.title || post.slug.replace(/-/g, ' ').toUpperCase();
            postsData.push(post);
          } catch(err) { console.warn("Fehler bei lokaler Datei:", file.name); }
        }
      }

      // 3. Sortieren und Rendern
      postsData.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
      allPosts = postsData;

      const render = (items) => {
        container.innerHTML = '';
        if (items.length === 0) {
          container.innerHTML = '<p style="color:var(--text-muted); grid-column: 1/-1; text-align: center;">Keine passenden Beiträge gefunden.</p>';
          return;
        }
        
        items.forEach((p) => {
          const card = document.createElement('a');
          card.href = p.url;
          card.className = 'post-card fade-up visible';
          
          let mediaHTML = '';
          if (p.featured_video) {
            mediaHTML = `<video autoplay muted loop playsinline poster="${p.image ? fixPath(p.image) : ''}"><source src="${fixPath(p.featured_video)}#t=0.1" type="video/mp4"></video>`;
          } else if (p.image) {
            mediaHTML = `<img src="${fixPath(p.image)}" alt="${p.title}" onerror="this.src='img/og-teaser.jpg'">`;
          } else {
             mediaHTML = `<img src="img/og-teaser.jpg" alt="Platzhalter">`;
          }

          card.innerHTML = `
            <div class="post-card-media">${mediaHTML}</div>
            <div class="post-card-body">
              <span class="post-tag">${p.category}</span>
              <h3>${p.title}</h3>
              <p class="post-card-desc">${p.description || 'Klicke hier, um den ganzen Impuls zu lesen.'}</p>
            </div>
          `;
          container.appendChild(card);
        });
      };

      // Alles beim ersten Laden anzeigen
      render(allPosts);

      // Echtzeitsuche ausführen, wenn getippt wird
      searchInput.addEventListener('input', e => {
        const val = e.target.value.toLowerCase();
        const filtered = allPosts.filter(p => 
          p.title.toLowerCase().includes(val) || 
          p.category.toLowerCase().includes(val) ||
          (p.description && p.description.toLowerCase().includes(val))
        );
        render(filtered);
      });

    } catch (e) { 
      console.error(e);
      // Zeige die Fehlermeldung nun genau an
      container.innerHTML = `
        <p style="text-align:center; grid-column:1/-1; color: var(--accent);">Archiv konnte nicht geladen werden.</p>
        <p style="text-align:center; grid-column:1/-1; color: var(--text-dim); font-size: 0.9rem;">Ursache: ${e.message}</p>
      `; 
    }
  }
  
  window.addEventListener('DOMContentLoaded', loadArchivePosts);
</script>
</body>
</html>
