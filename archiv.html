<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline' https://identity.netlify.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*; font-src 'self'; media-src 'self'; connect-src 'self' https://identity.netlify.com https://api.allorigins.win https://api.github.com; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archiv — Zeitqualität</title>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

<link rel="icon" type="image/png" href="img/zq-favicon.png">
<link rel="apple-touch-icon" href="img/zq-favicon.png">

<style>
  /* Wir importieren genau deine bestehenden Schriften und Farben */
  @font-face { font-family: 'Cormorant Garamond'; src: url('fonts/cormorant-garamond.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: swap; }
  @font-face { font-family: 'Figtree'; src: url('fonts/figtree.woff2') format('woff2'); font-weight: 300; font-style: normal; font-display: swap; }
  @font-face { font-family: 'IBM Plex Mono'; src: url('fonts/ibm-plex-mono.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: swap; }

  :root {
    --bg: #08090e; --bg-warm: #0c0d14; --bg-card: #11121a; --bg-card-hover: #161722; --bg-elevated: #1a1b26;
    --text: #e2dfd8; --text-muted: #918d84; --text-dim: #5c5950; --accent: #d4a56a; --accent-light: #e8c48e;
    --accent-dim: rgba(212, 165, 106, 0.1); --celestial: #7b9cc4; --border: #222330; --border-light: #1a1b26;
    --font-display: 'Cormorant Garamond', Georgia, serif; --font-body: 'Figtree', system-ui, sans-serif; --font-mono: 'IBM Plex Mono', monospace;
    --radius: 10px; --max-w: 1100px; --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    --fs-h1: 2.3rem; --fs-h3: 1.35rem; --fs-body: 1.02rem; --fs-small: 0.92rem; --fs-fine: 0.75rem;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font-body); background: var(--bg); color: var(--text); line-height: 1.75; font-weight: 300; -webkit-font-smoothing: antialiased; }
  a { color: var(--accent); text-decoration: none; transition: var(--transition); }
  
  .starfield { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
  .starfield canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(8, 9, 14, 0.85); backdrop-filter: blur(28px); border-bottom: 1px solid var(--border-light); }
  .nav-inner { max-width: var(--max-w); margin: 0 auto; padding: 0 2rem; height: 80px; display: flex; align-items: center; justify-content: space-between; }
  
  /* NEUES BILD-LOGO CSS */
  .logo-container {
    display: flex;
    align-items: center;
    text-decoration: none;
    height: 100%;
  }

  .nav-logo-img {
    height: 65px;
    width: auto;
    display: block;
    transition: var(--transition);
    border-radius: 4px;
    mix-blend-mode: lighten; 
  }

  .logo-container:hover .nav-logo-img {
    transform: scale(1.05);
    filter: brightness(1.2);
  }

  .nav-links { display: flex; gap: 2.2rem; align-items: center; }
  .nav-links a { color: var(--text-muted); font-size: var(--fs-small); text-transform: uppercase; }

  .header-spacer { height: 120px; }

  section { max-width: var(--max-w); margin: 0 auto; padding: 3rem 2rem 5rem; }
  .section-title { font-family: var(--font-display); font-size: var(--fs-h1); font-weight: 400; margin-bottom: 0.5rem; }

  .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
  .post-card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius); overflow: hidden; transition: var(--transition); display: block; color: inherit; }
  .post-card:hover { border-color: var(--border); transform: translateY(-3px); }
  .post-card-img { width: 100%; height: 195px; object-fit: cover; border-bottom: 1px solid var(--border-light); background: var(--bg-elevated); }
  .post-card-body { padding: 1.5rem; }
  .post-tag { font-family: var(--font-mono); font-size: var(--fs-fine); color: var(--accent); text-transform: uppercase; margin-bottom: 0.7rem; display: block; }
  .post-card h3 { font-family: var(--font-display); font-size: var(--fs-h3); font-weight: 500; margin-bottom: 0.5rem; color: var(--accent) !important; text-transform: uppercase; letter-spacing: 0.05em; }
  .post-card p { font-size: var(--fs-body); color: var(--text-muted); }

  footer { border-top: 1px solid var(--border-light); padding: 3.5rem 2rem; text-align: center; }
  .footer-note { color: var(--text-dim); font-size: 0.8rem; }
  
  .fade-up { opacity: 0; transform: translateY(24px); transition: 0.8s ease; }
  .fade-up.visible { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<div class="starfield"><canvas id="stars"></canvas></div>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo-container">
      <img src="img/zq-logo.png" alt="Zeitqualität ZQ Logo" class="nav-logo-img">
    </a>
    <div class="nav-links">
      <a href="index.html">← Zurück zur Startseite</a>
    </div>
  </div>
</nav>

<div class="header-spacer"></div>

<section id="archiv">
  <div style="display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 4rem;">
    <h2 class="section-title">Das kosmische Archiv</h2>
    <p style="color:var(--text-muted); margin-bottom: 2rem;">Durchsuche alle bisherigen Impulse, Artikel und Transite.</p>
    
    <div style="position: relative; width: 100%; max-width: 500px;">
      <input type="text" id="post-search" placeholder="Begriff eingeben (z.B. Vollmond)..." 
             style="width: 100%; padding: 16px 24px; background: var(--bg-warm); border: 1px solid var(--border); border-radius: 100px; color: var(--text); font-family: var(--font-body); font-size: 1.1rem; outline: none; transition: 0.3s;">
    </div>
  </div>
  
  <div id="dynamic-posts" class="posts-grid">
    <p style="color:var(--text-dim); text-align:center; grid-column: 1/-1;">Sondiere das Archiv...</p>
  </div>
</section>

<footer>
  <a href="index.html" class="logo-container" style="display: inline-flex; margin-bottom: 0.8rem;">
    <img src="img/zq-logo.png" alt="Zeitqualität ZQ Logo" class="nav-logo-img">
  </a>
  <p class="footer-note" style="margin-top: 1rem;">© 2026 Zeitqualität · Christian Balas</p>
</footer>

<script>
  // ── STERNE HINTERGRUND ──
  (function() {
    const canvas = document.getElementById('stars'); const ctx = canvas.getContext('2d');
    let stars = []; function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    function create() { stars = []; for(let i=0; i<150; i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*1.5, p:Math.random()*Math.PI*2}); }
    function draw(t) { ctx.clearRect(0,0,canvas.width,canvas.height); stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fillStyle = "#e2dfd8"; ctx.globalAlpha = Math.sin(t*0.001 + s.p)*0.4+0.6; ctx.fill(); }); requestAnimationFrame(draw); }
    resize(); create(); draw(0); window.addEventListener('resize', () => { resize(); create(); });
  })();

  // ── ARCHIV LADEN (OHNE LIMIT) ──
  let allPosts = [];
  async function loadCMSPosts() {
    const container = document.getElementById('dynamic-posts');
    const searchInput = document.getElementById('post-search');
    try {
      const apiURL = 'https://api.github.com/repos/chreever/zeitqualitaet/contents/posts?t=' + Date.now();
      const response = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(apiURL));
      const data = await response.json();
      let files = JSON.parse(data.contents);
      if (files && files.items) { files = files.items; }

      if (Array.isArray(files)) {
        allPosts = files.filter(f => f.name.endsWith('.md')).reverse().map(f => {
          const slug = f.name.replace('.md', '');
          return { slug, title: slug.replace(/-/g, ' ').toUpperCase(), url: `${slug}.html` }; // Hier wird auf die echte Seite verlinkt!
        });

        const render = (items) => {
          container.innerHTML = '';
          if (items.length === 0) {
            container.innerHTML = '<p style="color:var(--text-muted); grid-column: 1/-1; text-align: center;">Keine Beiträge gefunden.</p>';
            return;
          }
          items.forEach(p => {
            const card = document.createElement('a'); card.href = p.url; card.className = 'post-card fade-up visible'; card.style.opacity = "1";
            card.innerHTML = `<img class="post-card-img" src="img/${p.slug}.jpg" onerror="this.src='img/sternenhimmel-berge.jpg'"><div class="post-card-body"><span class="post-tag">Zeitqualität</span><h3>${p.title}</h3><p>Klicke zum Lesen.</p></div>`;
            container.appendChild(card);
          });
        };

        render(allPosts); // Alle Beiträge anzeigen (Kein Limit auf 6!)

        searchInput.addEventListener('input', e => {
          const val = e.target.value.toLowerCase();
          render(allPosts.filter(p => p.title.toLowerCase().includes(val)));
        });
      }
    } catch (e) { container.innerHTML = '<p style="text-align:center; grid-column:1/-1;">Archiv wird geladen...</p>'; }
  }
  window.addEventListener('DOMContentLoaded', loadCMSPosts);
</script>
</body>
</html>
