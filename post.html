<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*; font-src 'self'; connect-src 'self' https://raw.githubusercontent.com; base-uri 'self'; form-action 'self'">
<title>Beitrag lesen — Zeitqualität</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
  /* ── LOKALE SCHRIFTEN (CORPORATE DESIGN) ── */
  @font-face { font-family: 'Cormorant Garamond'; src: url('fonts/cormorant-garamond.woff2') format('woff2'); font-weight: 400; font-display: swap; }
  @font-face { font-family: 'Cormorant Garamond'; src: url('fonts/cormorant-garamond-500.woff2') format('woff2'); font-weight: 500; font-display: swap; }
  @font-face { font-family: 'Cormorant Garamond'; src: url('fonts/cormorant-garamond-italic.woff2') format('woff2'); font-style: italic; font-display: swap; }
  @font-face { font-family: 'Figtree'; src: url('fonts/figtree.woff2') format('woff2'); font-weight: 300; font-display: swap; }
  @font-face { font-family: 'Figtree'; src: url('fonts/figtree-400.woff2') format('woff2'); font-weight: 400; font-display: swap; }
  @font-face { font-family: 'Figtree'; src: url('fonts/figtree-500.woff2') format('woff2'); font-weight: 500; font-display: swap; }
  @font-face { font-family: 'IBM Plex Mono'; src: url('fonts/ibm-plex-mono.woff2') format('woff2'); font-weight: 400; font-display: swap; }

  :root {
    --bg: #08090e; --bg-warm: #0c0d14; --bg-card: #11121a; --bg-elevated: #1a1b26;
    --text: #e2dfd8; --text-muted: #918d84; --text-dim: #5c5950; 
    --accent: #d4a56a; --accent-light: #e8c48e; --accent-dim: rgba(212, 165, 106, 0.1);
    --border: #222330; --border-light: #1a1b26;
    --font-display: 'Cormorant Garamond', Georgia, serif; 
    --font-body: 'Figtree', system-ui, sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font-body); background: var(--bg); color: var(--text); line-height: 1.8; font-weight: 300; -webkit-font-smoothing: antialiased; }
  a { color: var(--accent); text-decoration: none; transition: 0.3s; }
  
  .starfield { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
  .starfield canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(8, 9, 14, 0.85); backdrop-filter: blur(28px); border-bottom: 1px solid var(--border-light); }
  .nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 2rem; height: 62px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: var(--font-display); font-size: 1.35rem; font-weight: 500; color: var(--text); }

  .article-container { max-width: 760px; margin: 120px auto 5rem; padding: 0 2rem; }
  .article-image { width: 100%; height: 400px; object-fit: cover; border-radius: var(--radius); margin-bottom: 3rem; background: var(--bg-elevated); border: 1px solid var(--border-light); filter: saturate(0.85); }
  
  .back-btn { display: inline-block; margin-bottom: 2rem; font-family: var(--font-mono); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); border: 1px solid var(--border-light); padding: 8px 16px; border-radius: 100px; transition: 0.3s; }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  /* ════════ CORPORATE DESIGN FÜR DEN INHALT (MD-UMWANDLUNG) ════════ */
  
  /* Überschriften */
  .post-content h1 { font-family: var(--font-display); font-size: clamp(2.4rem, 5vw, 3.2rem); margin-bottom: 1.5rem; font-weight: 400; line-height: 1.15; color: var(--text); letter-spacing: -0.01em; }
  .post-content h2 { font-family: var(--font-display); font-size: 2rem; margin: 3.5rem 0 1rem; font-weight: 400; color: var(--accent-light); line-height: 1.3; }
  .post-content h3 { font-family: var(--font-display); font-size: 1.5rem; margin: 2.5rem 0 0.8rem; font-weight: 500; color: var(--text); }
  .post-content h4, .post-content h5 { font-family: var(--font-display); font-size: 1.2rem; color: var(--text); margin: 1.5rem 0 0.5rem; }

  /* Fließtext & Betonungen */
  .post-content p { margin-bottom: 1.5rem; font-size: 1.1rem; color: var(--text-muted); line-height: 1.9; }
  .post-content strong, .post-content b { color: var(--text); font-weight: 500; }
  .post-content em, .post-content i { font-style: italic; color: var(--accent-light); }

  /* Links im Text */
  .post-content p a, .post-content li a { color: var(--accent); text-decoration: underline; text-decoration-color: var(--accent-dim); text-underline-offset: 4px; transition: 0.3s; }
  .post-content p a:hover, .post-content li a:hover { color: var(--accent-light); text-decoration-color: var(--accent-light); }

  /* Listen */
  .post-content ul { list-style: none; margin: 1.5rem 0 2rem; padding: 0; }
  .post-content ul li { position: relative; padding-left: 1.8rem; margin-bottom: 0.8rem; font-size: 1.1rem; color: var(--text-muted); line-height: 1.8; }
  .post-content ul li::before { content: '◦'; position: absolute; left: 0; top: -1px; color: var(--accent); font-size: 1.3em; }
  
  .post-content ol { list-style: none; margin: 1.5rem 0 2rem; padding: 0; counter-reset: post-counter; }
  .post-content ol li { counter-increment: post-counter; position: relative; padding-left: 2.5rem; margin-bottom: 1.2rem; font-size: 1.1rem; color: var(--text-muted); line-height: 1.8; }
  .post-content ol li::before { content: counter(post-counter); position: absolute; left: 0; top: 2px; width: 24px; height: 24px; border-radius: 50%; background: var(--accent-dim); border: 1px solid rgba(212, 165, 106, 0.2); color: var(--accent); font-family: var(--font-mono); font-size: 0.75rem; display: flex; align-items: center; justify-content: center; }

  /* Zitate (Blockquotes) */
  .post-content blockquote { border-left: 2px solid var(--accent); padding: 1.2rem 1.5rem; margin: 2.5rem 0; font-family: var(--font-display); font-size: 1.35rem; font-style: italic; color: var(--text-dim); line-height: 1.6; background: linear-gradient(90deg, rgba(212,165,106,0.05) 0%, transparent 100%); border-radius: 0 var(--radius) var(--radius) 0; }
  .post-content blockquote p { font-size: 1.35rem; margin-bottom: 0; color: inherit; }

  /* Bilder im Text */
  .post-content img { max-width: 100%; border-radius: var(--radius); margin: 2rem 0; border: 1px solid var(--border-light); }

  /* Trennlinien */
  .post-content hr { border: none; height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); margin: 3.5rem 0; }
  
  /* ════════ ENDE CORPORATE DESIGN ════════ */

  footer { border-top: 1px solid var(--border-light); padding: 3rem 2rem; text-align: center; color: var(--text-dim); margin-top: 4rem; }
  footer .logo { display: inline-block; margin-bottom: 0.5rem; color: var(--text); font-family: var(--font-display); font-size: 1.2rem; }
</style>
</head>
<body>

<div class="starfield"><canvas id="stars"></canvas></div>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo">◌ Zeitqualität</a>
    <a href="index.html" style="font-size: 0.8rem; color: var(--text-muted); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.1em;">← Zurück</a>
  </div>
</nav>

<div class="article-container">
  <a href="index.html#beitraege" class="back-btn">← Zurück zur Übersicht</a>
  
  <img id="post-image" class="article-image" src="" style="display: none;" alt="Beitragsbild">

  <article id="post-content" class="post-content">
    <p>Signal wird gesucht...</p>
  </article>
</div>

<footer>
  <a href="index.html" class="logo">◌ Zeitqualität</a>
  <p style="font-size: 0.85rem; font-family: var(--font-body);">© 2026 Zeitqualität · Christian</p>
</footer>

<script>
  // Sterne Hintergrund
  (function() {
    const canvas = document.getElementById('stars'); const ctx = canvas.getContext('2d');
    let stars = []; function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    function create() { stars = []; for(let i=0; i<150; i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*1.5, p:Math.random()*Math.PI*2}); }
    function draw(t) { ctx.clearRect(0,0,canvas.width,canvas.height); stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fillStyle = "#e2dfd8"; ctx.globalAlpha = Math.sin(t*0.001 + s.p)*0.4+0.6; ctx.fill(); }); requestAnimationFrame(draw); }
    resize(); create(); draw(0); window.addEventListener('resize', resize);
  })();

  // Lade den Beitrag sicher
  async function renderPost() {
    const params = new URLSearchParams(window.location.search);
    const postId = params.get('id');

    if (!postId) {
      document.getElementById('post-content').innerHTML = "<h1>Kein Beitrag gefunden</h1><p>Die Sterne schweigen.</p>";
      return;
    }

    try {
      // Bild setzen
      const img = document.getElementById('post-image');
      img.src = `img/${postId}.jpg`;
      img.onerror = () => { img.src = 'img/sternenhimmel-berge.jpg'; };
      img.style.display = 'block';

      // Text abrufen
      let response = await fetch(`posts/${postId}.md`);
      
      if (!response.ok) {
        response = await fetch(`https://raw.githubusercontent.com/chreever/zeitqualitaet/main/posts/${postId}.md`);
      }
      
      if (!response.ok) throw new Error("Nicht gefunden");
      
      const rawText = await response.text();

      // Frontmatter bereinigen
      let markdownBody = rawText;
      let postTitle = postId.replace(/-/g, ' ').toUpperCase();

      if (rawText.startsWith('---')) {
        const parts = rawText.split('---');
        if (parts.length >= 3) {
          markdownBody = parts.slice(2).join('---');
          const titleMatch = parts[1].match(/title:\s*['"]?(.*?)['"]?\n/);
          if (titleMatch) postTitle = titleMatch[1];
        }
      }

      // Markdown in HTML übersetzen
      const finalHTML = `<h1>${postTitle}</h1>` + marked.parse(markdownBody);
      document.getElementById('post-content').innerHTML = finalHTML;
      document.title = `${postTitle} — Zeitqualität`;

    } catch (e) {
      document.getElementById('post-content').innerHTML = "<h1>Signal verloren</h1><p>Dieser Beitrag konnte nicht geladen werden. Bitte stelle sicher, dass die Datei im Ordner 'posts' auf GitHub existiert.</p>";
    }
  }

  renderPost();
</script>
</body>
</html>
