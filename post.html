<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impuls — Zeitqualität | Kompass für Kopf und Seele</title>
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="Zeitqualität">
  <meta property="og:url" id="og-url" content="https://zeitqualität.at/">
  <meta property="og:title" id="og-title" content="Ein neuer Impuls von Christian — Zeitqualität">
  <meta property="og:description" id="og-desc" content="Was jetzt wichtig wird und wie wir damit umgehen.">
  <meta property="og:image" id="og-image" content="https://raw.githubusercontent.com/chreever/zeitqualitaet/main/img/og-teaser.jpg">
  
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <link rel="icon" type="image/svg+xml" href="img/zq-favicon.svg">
  <link rel="alternate icon" href="img/zq-favicon.png">
  <link rel="apple-touch-icon" href="img/zq-favicon.png">

  <style>
    /* ── LOKALE SCHRIFTEN (CORPORATE DESIGN) ── */
    @font-face { font-family: 'Cormorant Garamond'; src: url('fonts/cormorant-garamond.woff2') format('woff2'); font-weight: 400; font-display: swap; }
    @font-face { font-family: 'Cormorant Garamond'; src: url('fonts/cormorant-garamond-500.woff2') format('woff2'); font-weight: 500; font-display: swap; }
    @font-face { font-family: 'Cormorant Garamond'; src: url('fonts/cormorant-garamond-italic.woff2') format('woff2'); font-style: italic; font-display: swap; }
    @font-face { font-family: 'Figtree'; src: url('fonts/figtree.woff2') format('woff2'); font-weight: 300; font-display: swap; }
    @font-face { font-family: 'Figtree'; src: url('fonts/figtree-400.woff2') format('woff2'); font-weight: 400; font-display: swap; }
    @font-face { font-family: 'Figtree'; src: url('fonts/figtree-500.woff2') format('woff2'); font-weight: 500; font-display: swap; }
    @font-face { font-family: 'IBM Plex Mono'; src: url('fonts/ibm-plex-mono.woff2') format('woff2'); font-weight: 400; font-display: swap; }

    :root {
      --bg: #08090e; --bg-warm: #0c0d14; --bg-card: #11121a; --bg-elevated: #1a1b26;
      --text: #e2dfd8; --text-muted: #918d84; --text-dim: #5c5950; 
      --accent: #d4a56a; --accent-light: #e8c48e; --accent-dim: rgba(212, 165, 106, 0.1);
      --border: #222330; --border-light: #1a1b26;
      --font-display: 'Cormorant Garamond', Georgia, serif; 
      --font-body: 'Figtree', system-ui, sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
      --radius: 10px;
      --transition: 0.3s;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-body); background: var(--bg); color: var(--text); line-height: 1.8; font-weight: 300; -webkit-font-smoothing: antialiased; }
    a { color: var(--accent); text-decoration: none; transition: 0.3s; }
    
    .starfield { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
    .starfield canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

    /* ── NAV & LOGO ANPASSUNGEN ── */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(8, 9, 14, 0.85); backdrop-filter: blur(28px); border-bottom: 1px solid var(--border-light); }
    .nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 2rem; height: 80px; display: flex; align-items: center; justify-content: space-between; }
    
    .logo-container {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      height: 100%;
    }

    .logo-container svg, .logo-container span {
      transition: var(--transition);
    }

    .logo-container:hover svg {
      transform: scale(1.08) rotate(5deg);
      filter: brightness(1.2);
    }

    .logo-container:hover span {
      color: var(--accent);
    }

    .article-container { max-width: 760px; margin: 120px auto 5rem; padding: 0 2rem; }
    
    /* ── CONTAINER FÜR BILD ODER VIDEO ── */
    #media-container {
      width: 100%;
      margin-bottom: 3rem;
    }

    .article-image { 
      width: 100%; 
      height: 400px; 
      object-fit: cover; 
      border-radius: var(--radius); 
      background: var(--bg-elevated); 
      border: 1px solid var(--border-light); 
      display: block;
    }
    
    .back-btn { display: inline-block; margin-bottom: 2rem; font-family: var(--font-mono); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); border: 1px solid var(--border-light); padding: 8px 16px; border-radius: 100px; transition: 0.3s; }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    /* ════════ CORPORATE DESIGN FÜR DEN INHALT ════════ */
    .post-content h1 { font-family: var(--font-display); font-size: clamp(2.4rem, 5vw, 3.2rem); margin-bottom: 1.5rem; font-weight: 400; line-height: 1.15; color: var(--accent); letter-spacing: -0.05em; text-transform: uppercase; }
    .post-content h2 { font-family: var(--font-display); font-size: 2rem; margin: 3.5rem 0 1rem; font-weight: 400; color: var(--accent-light); line-height: 1.3; }
    .post-content h3 { font-family: var(--font-display); font-size: 1.5rem; margin: 2.5rem 0 0.8rem; font-weight: 500; color: var(--accent-light); }
    .post-content p { margin-bottom: 1.5rem; font-size: 1.1rem; color: var(--text-muted); line-height: 1.9; }
    .post-content strong { color: var(--text); font-weight: 500; }
    .post-content blockquote { border-left: 2px solid var(--accent); padding: 1.2rem 1.5rem; margin: 2.5rem 0; font-family: var(--font-display); font-size: 1.35rem; font-style: italic; color: var(--text-dim); background: linear-gradient(90deg, rgba(212,165,106,0.05) 0%, transparent 100%); }

    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0.6rem 1.4rem;
      border-radius: 100px;
      font-family: var(--font-body);
      font-size: 0.92rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      margin-top: 3rem;
    }

    .share-btn:hover {
      background: var(--accent-dim);
      transform: translateY(-2px);
    }

    footer { border-top: 1px solid var(--border-light); padding: 3rem 2rem; text-align: center; color: var(--text-dim); margin-top: 4rem; }

    @media (max-width: 768px) {
      .nav-inner { height: 70px; }
      .article-container { margin-top: 100px; }
      .article-image { height: 250px; }
    }
  </style>
</head>
<body>

<div class="starfield"><canvas id="stars"></canvas></div>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo-container">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" style="height: 42px; width: 42px;">
        <defs>
          <linearGradient id="gold-logo" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f2d5a3"/>
            <stop offset="40%" stop-color="#d4a56a"/>
            <stop offset="100%" stop-color="#a67b45"/>
          </linearGradient>
        </defs>
        <circle cx="60" cy="60" r="54" fill="none" stroke="url(#gold-logo)" stroke-width="1.5" opacity="0.25"/>
        <circle cx="60" cy="60" r="44" fill="none" stroke="url(#gold-logo)" stroke-width="0.5" opacity="0.6"/>
        <path d="M60 8 Q60 60 8 60 Q60 60 60 112 Q60 60 112 60 Q60 60 60 8 Z" fill="url(#gold-logo)" opacity="0.15"/>
        <path d="M60 22 Q60 60 22 60 Q60 60 60 98 Q60 60 98 60 Q60 60 60 22 Z" fill="url(#gold-logo)"/>
        <circle cx="60" cy="60" r="2.5" fill="#ffffff" opacity="0.9"/>
      </svg>
      <span style="font-family: var(--font-display); font-size: 1.6rem; color: var(--text); font-weight: 400; letter-spacing: 0.04em;">Zeitqualität</span>
    </a>
    <a href="index.html" style="font-size: 0.8rem; color: var(--text-muted); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.1em;">← Zurück</a>
  </div>
</nav>

<div class="article-container">
  <a href="javascript:history.back()" class="back-btn">← Zurück</a>
  
  <div id="media-container"></div>

  <article id="post-content" class="post-content">
    <p>Signal wird gesucht...</p>
  </article>

  <button id="share-btn" class="share-btn">
    <span class="share-icon">↗</span> Beitrag teilen
  </button>
</div>

<footer>
  <a href="index.html" class="logo-container" style="display: inline-flex; margin-bottom: 0.8rem;">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" style="height: 42px; width: 42px;">
      <defs>
        <linearGradient id="gold-logo-footer" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#f2d5a3"/>
          <stop offset="40%" stop-color="#d4a56a"/>
          <stop offset="100%" stop-color="#a67b45"/>
        </linearGradient>
      </defs>
      <circle cx="60" cy="60" r="54" fill="none" stroke="url(#gold-logo-footer)" stroke-width="1.5" opacity="0.25"/>
      <circle cx="60" cy="60" r="44" fill="none" stroke="url(#gold-logo-footer)" stroke-width="0.5" opacity="0.6"/>
      <path d="M60 8 Q60 60 8 60 Q60 60 60 112 Q60 60 112 60 Q60 60 60 8 Z" fill="url(#gold-logo-footer)" opacity="0.15"/>
      <path d="M60 22 Q60 60 22 60 Q60 60 60 98 Q60 60 98 60 Q60 60 60 22 Z" fill="url(#gold-logo-footer)"/>
      <circle cx="60" cy="60" r="2.5" fill="#ffffff" opacity="0.9"/>
    </svg>
    <span style="font-family: var(--font-display); font-size: 1.6rem; color: var(--text); font-weight: 400; letter-spacing: 0.04em;">Zeitqualität</span>
  </a>
  <p style="font-size: 0.85rem; font-family: var(--font-body); margin-top: 0.5rem;">© 2026 Zeitqualität · Christian</p>
</footer>

<script>
  // Sterne Hintergrund
  (function() {
    const canvas = document.getElementById('stars'); const ctx = canvas.getContext('2d');
    let stars = []; function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    function create() { stars = []; for(let i=0; i<150; i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*1.5, p:Math.random()*Math.PI*2}); }
    function draw(t) { ctx.clearRect(0,0,canvas.width,canvas.height); stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fillStyle = "#e2dfd8"; ctx.globalAlpha = Math.sin(t*0.001 + s.p)*0.4+0.6; ctx.fill(); }); requestAnimationFrame(draw); }
    resize(); create(); draw(0); window.addEventListener('resize', resize);
  })();

  function fixPath(path) {
    if (!path) return "";
    let clean = path.trim().replace(/['"]/g, ''); 
    if (clean.startsWith('http') || clean.startsWith('/')) return clean;
    return '/' + clean;
  }

  async function renderPost() {
    const params = new URLSearchParams(window.location.search);
    let postId = params.get('id');
    if (!postId) return;

    // KORREKTUR: Dekodierung für Sonderzeichen (&, Umlaute etc.)
    postId = decodeURIComponent(postId);

    try {
      let response = await fetch(`posts/${postId}.md`);
      
      // Falls lokaler fetch fehlschlägt, versuchen wir es direkt über GitHub
      if (!response.ok) {
        response = await fetch(`https://raw.githubusercontent.com/chreever/zeitqualitaet/main/posts/${postId}.md`);
      }
      
      if (!response.ok) throw new Error("Datei nicht gefunden");
      
      const rawText = await response.text();
      let markdownBody = "";
      let postTitle = "";
      let customImage = "";
      let bannerVideo = "";
      let featuredVideo = "";
      let postDescription = "";

      if (rawText.startsWith('---')) {
        const parts = rawText.split('---');
        if (parts.length >= 3) {
          const lines = parts[1].split('\n');
          lines.forEach(line => {
            const separatorIndex = line.indexOf(':');
            if (separatorIndex !== -1) {
              const key = line.substring(0, separatorIndex).trim().toLowerCase();
              const value = line.substring(separatorIndex + 1).trim().replace(/['"]/g, '');
              if (key === 'title') postTitle = value;
              if (key === 'image') customImage = value;
              if (key === 'video') bannerVideo = value;
              if (key === 'featured_video') featuredVideo = value;
              if (key === 'description') postDescription = value;
            }
          });
          markdownBody = parts.slice(2).join('---').trim();
        }
      }

      // Medien (Bild oder Video) einfügen
      const mediaContainer = document.getElementById('media-container');
      const activeVideo = bannerVideo || featuredVideo;

      if (activeVideo && activeVideo.trim() !== "") {
        mediaContainer.innerHTML = `
          <video class="article-image" autoplay muted loop playsinline poster="${customImage ? fixPath(customImage) : ''}">
            <source src="${fixPath(activeVideo)}#t=0.1" type="video/mp4">
          </video>`;
      } else if (customImage && customImage.trim() !== "") {
        mediaContainer.innerHTML = `<img class="article-image" src="${fixPath(customImage)}" alt="Beitragsbild">`;
      }

      // Text rendern
      document.getElementById('post-content').innerHTML = `<h1>${postTitle || postId}</h1>` + marked.parse(markdownBody);
      document.title = `${postTitle || 'Beitrag'} — Zeitqualität`;

      // Meta-Tags für Social Media
      if (postTitle) document.getElementById('og-title').setAttribute('content', postTitle);
      if (postDescription) document.getElementById('og-desc').setAttribute('content', postDescription);
      document.getElementById('og-url').setAttribute('content', window.location.href);

    } catch (e) {
      console.error(e);
      document.getElementById('post-content').innerHTML = `
        <h1>Signal verloren</h1>
        <p>Der Beitrag "<strong>${postId}</strong>" konnte nicht geladen werden.</p>
        <p style="font-size: 0.9rem; color: var(--text-dim);">Bitte prüfe, ob der Dateiname in GitHub exakt so lautet wie in der Adresszeile oben (Groß/Kleinschreibung beachten!).</p>
      `;
    }
  }

  renderPost();

  // Share Logik
  const shareBtn = document.getElementById('share-btn');
  if (shareBtn) {
    shareBtn.addEventListener('click', async () => {
      if (navigator.share) {
        try {
          await navigator.share({
            title: document.title,
            url: window.location.href
          });
        } catch (err) {}
      } else {
        navigator.clipboard.writeText(window.location.href);
        const originalText = shareBtn.innerHTML;
        shareBtn.innerHTML = '✨ Link kopiert!';
        setTimeout(() => { shareBtn.innerHTML = originalText; }, 2500);
      }
    });
  }
</script>
</body>
</html>
