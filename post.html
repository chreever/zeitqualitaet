<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beitrag lesen — Zeitqualität</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
  /* ── DEINE SCHRIFTEN & FARBEN ── */
  @font-face { font-family: 'Cormorant Garamond'; src: url('fonts/cormorant-garamond.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: swap; }
  @font-face { font-family: 'Figtree'; src: url('fonts/figtree.woff2') format('woff2'); font-weight: 300; font-style: normal; font-display: swap; }
  @font-face { font-family: 'IBM Plex Mono'; src: url('fonts/ibm-plex-mono.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: swap; }

  :root {
    --bg: #08090e; --bg-warm: #0c0d14; --bg-card: #11121a; --text: #e2dfd8; --text-muted: #918d84; --accent: #d4a56a; --border-light: #1a1b26;
    --font-display: 'Cormorant Garamond', Georgia, serif; --font-body: 'Figtree', system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font-body); background: var(--bg); color: var(--text); line-height: 1.8; font-weight: 300; -webkit-font-smoothing: antialiased; }
  a { color: var(--accent); text-decoration: none; }
  
  .starfield { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
  .starfield canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(8, 9, 14, 0.85); backdrop-filter: blur(28px); border-bottom: 1px solid var(--border-light); }
  .nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 2rem; height: 62px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: var(--font-display); font-size: 1.35rem; font-weight: 500; color: var(--text); }

  .article-container { max-width: 800px; margin: 120px auto 5rem; padding: 0 2rem; }
  .article-image { width: 100%; height: 400px; object-fit: cover; border-radius: 10px; margin-bottom: 3rem; background: var(--bg-card); border: 1px solid var(--border-light); }
  
  .post-content h1 { font-family: var(--font-display); font-size: 3rem; margin-bottom: 1.5rem; font-weight: 400; line-height: 1.2; color: var(--accent); }
  .post-content h2 { font-family: var(--font-display); font-size: 2rem; margin: 2.5rem 0 1rem; font-weight: 400; color: var(--text); }
  .post-content p { margin-bottom: 1.5rem; font-size: 1.1rem; color: var(--text-muted); }
  .post-content strong { color: var(--text); font-weight: 500; }
  
  .back-btn { display: inline-block; margin-bottom: 2rem; font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); border: 1px solid var(--border-light); padding: 8px 16px; border-radius: 100px; transition: 0.3s; }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<div class="starfield"><canvas id="stars"></canvas></div>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo">◌ Zeitqualität</a>
    <a href="index.html" style="font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em;">← Zurück</a>
  </div>
</nav>

<div class="article-container">
  <a href="index.html" class="back-btn">← Zurück zur Übersicht</a>
  
  <img id="post-image" class="article-image" src="" style="display: none;" alt="Beitragsbild">

  <article id="post-content" class="post-content">
    <p>Empfange kosmische Daten...</p>
  </article>
</div>

<script>
  // Sterne Hintergrund
  (function() {
    const canvas = document.getElementById('stars'); const ctx = canvas.getContext('2d');
    let stars = []; function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    function create() { stars = []; for(let i=0; i<150; i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*1.5, p:Math.random()*Math.PI*2}); }
    function draw(t) { ctx.clearRect(0,0,canvas.width,canvas.height); stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fillStyle = "#e2dfd8"; ctx.globalAlpha = Math.sin(t*0.001 + s.p)*0.4+0.6; ctx.fill(); }); requestAnimationFrame(draw); }
    resize(); create(); draw(0); window.addEventListener('resize', resize);
  })();

  // Lade den Beitrag
  async function renderPost() {
    // Welcher Beitrag soll geladen werden? (Aus der URL gelesen)
    const params = new URLSearchParams(window.location.search);
    const postId = params.get('id');

    if (!postId) {
      document.getElementById('post-content').innerHTML = "<h1>Kein Beitrag gefunden</h1><p>Die Sterne schweigen.</p>";
      return;
    }

    try {
      // 1. Bild laden (versucht einfach, ein Bild mit dem gleichen Namen zu laden)
      const img = document.getElementById('post-image');
      img.src = `img/${postId}.jpg`;
      img.onerror = () => { img.src = 'img/sternenhimmel-berge.jpg'; }; // Fallback-Bild
      img.style.display = 'block';

      // 2. Text von GitHub holen
      const response = await fetch(`https://raw.githubusercontent.com/chreever/zeitqualitaet/main/posts/${postId}.md`);
      
      if (!response.ok) throw new Error("Nicht gefunden");
      
      const rawText = await response.text();

      // Das CMS fügt oben oft Daten (Frontmatter) zwischen "---" ein. Das schneiden wir hier ab.
      let markdownBody = rawText;
      let postTitle = postId.replace(/-/g, ' ').toUpperCase();

      if (rawText.startsWith('---')) {
        const parts = rawText.split('---');
        if (parts.length >= 3) {
          markdownBody = parts.slice(2).join('---'); // Der eigentliche Text
          
          // Versuche den echten Titel aus den CMS-Daten zu lesen
          const frontmatter = parts[1];
          const titleMatch = frontmatter.match(/title:\s*['"]?(.*?)['"]?\n/);
          if (titleMatch) postTitle = titleMatch[1];
        }
      }

      // Füge den Titel oben als H1 ein und übersetze den Markdown-Text in HTML
      const finalHTML = `<h1>${postTitle}</h1>` + marked.parse(markdownBody);
      document.getElementById('post-content').innerHTML = finalHTML;
      document.title = `${postTitle} — Zeitqualität`;

    } catch (e) {
      document.getElementById('post-content').innerHTML = "<h1>Signal verloren</h1><p>Dieser Beitrag konnte nicht im Archiv gefunden werden.</p>";
    }
  }

  renderPost();
</script>
</body>
</html>
